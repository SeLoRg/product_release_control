services:
  db:
    image: postgres:16.0
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
    env_file:
      - src/backend/core/env-files/.env

  alembic_service:
      image: alembic:1.0
      build:
        context: .
        dockerfile: alembic_service/Dockerfile
      env_file:
        - src/backend/core/env-files/.env
      depends_on:
        db:
          condition: service_healthy
      volumes:
        - ./alembic_service/alembic/versions:/alembic_service/alembic/versions

volumes:
  db-data:
